<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Family Business Analytics Dashboard</title>
    <style>
      :root {
        --bg: #f5f1e8;
        --bg-2: #ede6d7;
        --panel: rgba(255, 255, 255, 0.86);
        --panel-strong: rgba(255, 255, 255, 0.96);
        --stroke: rgba(20, 44, 56, 0.12);
        --text: #17303b;
        --muted: #5f7480;
        --navy: #163444;
        --teal: #138a87;
        --gold: #d89b2f;
        --coral: #cd5d48;
        --slate: #5b6f7e;
        --green: #2f7d4e;
        --yellow: #e8b84b;
        --red: #cb4b42;
        --shadow: 0 18px 42px rgba(18, 38, 47, 0.12);
        --radius: 22px;
        --radius-sm: 14px;
        --serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        --sans: "Aptos", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: var(--sans);
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(216, 155, 47, 0.18), transparent 26%),
          radial-gradient(circle at 80% 18%, rgba(19, 138, 135, 0.16), transparent 24%),
          linear-gradient(180deg, #f8f4ec 0%, #efe8dc 48%, #e9e1d1 100%);
        min-height: 100vh;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(22, 52, 68, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(22, 52, 68, 0.03) 1px, transparent 1px);
        background-size: 32px 32px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.36), transparent 88%);
      }

      .app-shell {
        width: min(1440px, calc(100vw - 32px));
        margin: 20px auto 44px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(0, 1fr);
        gap: 18px;
        padding: 22px;
        border-radius: 30px;
        background:
          linear-gradient(135deg, rgba(22, 52, 68, 0.95), rgba(30, 80, 88, 0.92)),
          linear-gradient(45deg, rgba(216, 155, 47, 0.2), transparent);
        color: #f8fbfc;
        box-shadow: 0 20px 50px rgba(19, 44, 57, 0.22);
        overflow: hidden;
        position: relative;
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto -10% -35% 38%;
        height: 280px;
        background: radial-gradient(circle, rgba(216, 155, 47, 0.22), transparent 62%);
        pointer-events: none;
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(248, 251, 252, 0.72);
      }

      h1 {
        margin: 0 0 10px;
        font-family: var(--serif);
        font-size: clamp(2rem, 4vw, 3.35rem);
        line-height: 1.04;
        letter-spacing: -0.04em;
      }

      .hero p.lead {
        margin: 0;
        max-width: 72ch;
        line-height: 1.58;
        color: rgba(248, 251, 252, 0.84);
      }

      button,
      select,
      input {
        font: inherit;
      }

      .tab-btn,
      .lang-btn,
      .preset-btn,
      .ghost-btn,
      .metric-btn,
      .chip-btn,
      .mini-btn,
      .resource-link {
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease, color 150ms ease;
      }

      .tab-btn:hover,
      .lang-btn:hover,
      .preset-btn:hover,
      .ghost-btn:hover,
      .metric-btn:hover,
      .chip-btn:hover,
      .mini-btn:hover,
      .resource-link:hover {
        transform: translateY(-1px);
      }

      .note-banner {
        border-radius: 18px;
        padding: 12px 14px;
        background: rgba(248, 251, 252, 0.12);
        border: 1px solid rgba(248, 251, 252, 0.18);
        color: rgba(248, 251, 252, 0.88);
        line-height: 1.5;
      }

      .hero-metrics {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        align-content: start;
      }

      .metric-card {
        padding: 16px 16px 14px;
        border-radius: 20px;
        background: rgba(248, 251, 252, 0.1);
        border: 1px solid rgba(248, 251, 252, 0.14);
        backdrop-filter: blur(8px);
        min-height: 122px;
      }

      .metric-card .label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: rgba(248, 251, 252, 0.7);
      }

      .metric-card .value {
        margin: 8px 0 6px;
        font-size: clamp(1.7rem, 4vw, 2.25rem);
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .metric-card .sub {
        color: rgba(248, 251, 252, 0.78);
        line-height: 1.5;
        font-size: 14px;
      }

      .control-bar {
        position: sticky;
        top: 10px;
        z-index: 20;
        margin-top: 18px;
        border-radius: 26px;
        padding: 18px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(22, 52, 68, 0.08);
        box-shadow: var(--shadow);
      }

      .control-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      .tab-strip,
      .lang-strip,
      .preset-strip,
      .metric-strip,
      .legend,
      .selection-chipline {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .tab-btn,
      .lang-btn,
      .preset-btn,
      .ghost-btn,
      .metric-btn,
      .mini-btn,
      .chip-btn {
        background: #eef3f3;
        color: var(--navy);
        padding: 10px 14px;
        font-weight: 700;
      }

      .tab-btn.active,
      .lang-btn.active,
      .preset-btn.active,
      .metric-btn.active,
      .chip-btn.active {
        background: linear-gradient(135deg, var(--navy), #204f5e);
        color: #fff;
        box-shadow: 0 10px 22px rgba(18, 52, 68, 0.16);
      }

      .ghost-btn {
        background: rgba(22, 52, 68, 0.08);
      }

      .mini-btn {
        padding: 6px 10px;
        font-size: 12px;
        background: rgba(22, 52, 68, 0.08);
      }

      .filters-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 12px;
      }

      .filter-field {
        display: grid;
        gap: 6px;
      }

      .filter-field label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
      }

      .filter-field select {
        width: 100%;
        border-radius: 14px;
        border: 1px solid rgba(22, 52, 68, 0.12);
        background: rgba(255, 255, 255, 0.9);
        padding: 12px 14px;
        color: var(--text);
      }

      .selection-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-top: 14px;
      }

      .selection-chipline {
        flex: 1;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(22, 52, 68, 0.08);
        color: var(--navy);
        font-weight: 600;
      }

      .content {
        margin-top: 18px;
      }

      .tab-page {
        display: none;
      }

      .tab-page.active {
        display: block;
      }

      .panel-grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 16px;
      }

      .panel {
        grid-column: span 4;
        background: var(--panel);
        border-radius: var(--radius);
        border: 1px solid rgba(22, 52, 68, 0.08);
        box-shadow: var(--shadow);
        padding: 18px;
        overflow: hidden;
      }

      .panel.span-5 {
        grid-column: span 5;
      }

      .panel.span-6 {
        grid-column: span 6;
      }

      .panel.span-7 {
        grid-column: span 7;
      }

      .panel.span-8 {
        grid-column: span 8;
      }

      .panel.span-12 {
        grid-column: 1 / -1;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 12px;
      }

      .panel-title {
        margin: 0;
        font-size: 1.15rem;
        line-height: 1.2;
        letter-spacing: -0.02em;
      }

      .panel-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        line-height: 1.45;
        font-size: 14px;
      }

      .sub-note {
        margin-top: 10px;
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(22, 52, 68, 0.05);
        color: var(--muted);
        line-height: 1.52;
        font-size: 13px;
      }

      .chart-host {
        min-height: 280px;
      }

      .chart-host svg {
        width: 100%;
        height: auto;
        display: block;
      }

      .legend {
        margin-top: 8px;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 999px;
      }

      .bar-list {
        display: grid;
        gap: 12px;
      }

      .bar-row {
        width: 100%;
        border: 0;
        background: rgba(255, 255, 255, 0.72);
        border-radius: 18px;
        padding: 12px 14px;
        display: grid;
        grid-template-columns: 148px 1fr 52px;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        text-align: left;
      }

      .bar-row:hover,
      .country-card:hover,
      .heat-cell:hover,
      .table-row:hover,
      .metric-comparison button:hover,
      .risk-card:hover,
      .firm-profile:hover {
        box-shadow: 0 10px 22px rgba(18, 52, 68, 0.12);
      }

      .bar-track {
        position: relative;
        height: 16px;
        border-radius: 999px;
        background: rgba(22, 52, 68, 0.08);
        overflow: hidden;
      }

      .bar-fill {
        position: absolute;
        inset: 0 auto 0 0;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--teal), rgba(19, 138, 135, 0.45));
      }

      .bar-row .value {
        text-align: right;
        font-weight: 800;
      }

      .country-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      .country-card {
        border: 1px solid rgba(22, 52, 68, 0.08);
        background: rgba(255, 255, 255, 0.84);
        border-radius: 20px;
        padding: 14px;
        cursor: pointer;
        transition: transform 150ms ease, box-shadow 150ms ease;
      }

      .country-card.active {
        border-color: rgba(216, 155, 47, 0.8);
        box-shadow: 0 14px 28px rgba(216, 155, 47, 0.16);
      }

      .country-card h4 {
        margin: 0 0 10px;
        font-size: 1.02rem;
      }

      .country-statline {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin: 6px 0;
        color: var(--muted);
      }

      .country-statline strong {
        color: var(--text);
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .pill {
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(22, 52, 68, 0.08);
        color: var(--navy);
        font-size: 12px;
        font-weight: 700;
      }

      .heatmap {
        display: grid;
        gap: 8px;
      }

      .heat-row,
      .heat-head {
        display: grid;
        grid-template-columns: 168px repeat(5, minmax(0, 1fr));
        gap: 8px;
      }

      .heat-head {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .heat-label {
        display: flex;
        align-items: center;
        font-weight: 700;
      }

      .heat-cell {
        border: 0;
        border-radius: 16px;
        padding: 12px 10px;
        cursor: pointer;
        color: var(--navy);
        text-align: center;
        font-weight: 800;
      }

      .stack-list {
        display: grid;
        gap: 12px;
      }

      .stack-row {
        display: grid;
        grid-template-columns: 128px 1fr 46px;
        gap: 10px;
        align-items: center;
      }

      .stack-track {
        display: flex;
        gap: 2px;
        height: 20px;
        background: rgba(22, 52, 68, 0.08);
        border-radius: 999px;
        overflow: hidden;
      }

      .stack-segment {
        border: 0;
        cursor: pointer;
      }

      .risk-grid {
        display: grid;
        gap: 12px;
      }

      .risk-card {
        border: 1px solid rgba(22, 52, 68, 0.08);
        background: rgba(255, 255, 255, 0.84);
        border-radius: 20px;
        padding: 14px;
        cursor: pointer;
      }

      .risk-title {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: baseline;
        margin-bottom: 10px;
      }

      .risk-bars {
        display: grid;
        gap: 8px;
      }

      .risk-line {
        display: grid;
        grid-template-columns: 88px 1fr 36px;
        gap: 8px;
        align-items: center;
        font-size: 13px;
      }

      .mini-track {
        position: relative;
        height: 10px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(22, 52, 68, 0.08);
      }

      .mini-fill {
        position: absolute;
        inset: 0 auto 0 0;
        border-radius: 999px;
      }

      .explorer-layout {
        display: grid;
        grid-template-columns: minmax(0, 1.8fr) minmax(320px, 1fr);
        gap: 14px;
      }

      .table-wrap {
        border: 1px solid rgba(22, 52, 68, 0.08);
        border-radius: 20px;
        overflow: auto;
        background: rgba(255, 255, 255, 0.84);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: #f7f8f6;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        text-align: left;
        padding: 12px 14px;
      }

      tbody td {
        padding: 12px 14px;
        border-top: 1px solid rgba(22, 52, 68, 0.08);
        vertical-align: top;
      }

      .table-row {
        cursor: pointer;
      }

      .table-row.active {
        background: rgba(19, 138, 135, 0.09);
      }

      .firm-name {
        font-weight: 700;
      }

      .muted {
        color: var(--muted);
      }

      .status-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 999px;
        margin-right: 6px;
      }

      .firm-profile {
        border: 1px solid rgba(22, 52, 68, 0.08);
        border-radius: 22px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.88);
      }

      .firm-profile h3 {
        margin: 0 0 6px;
        font-size: 1.2rem;
      }

      .profile-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin: 14px 0;
      }

      .profile-stat {
        border-radius: 16px;
        padding: 12px;
        background: rgba(22, 52, 68, 0.05);
      }

      .profile-stat .k {
        display: block;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 4px;
      }

      .chip-cloud {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .flag-chip {
        padding: 7px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        background: rgba(22, 52, 68, 0.08);
      }

      .flag-chip.ok {
        background: rgba(47, 125, 78, 0.14);
        color: #205a38;
      }

      .flag-chip.warn {
        background: rgba(205, 93, 72, 0.15);
        color: #8d3428;
      }

      .metric-comparison {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .metric-comparison .compare-card {
        border-radius: 22px;
        border: 1px solid rgba(22, 52, 68, 0.08);
        background: rgba(255, 255, 255, 0.84);
        padding: 14px;
      }

      .metric-comparison .compare-card h4 {
        margin: 0 0 10px;
      }

      .compare-card button {
        width: 100%;
        border: 0;
        text-align: left;
        padding: 12px;
        border-radius: 16px;
        background: rgba(22, 52, 68, 0.05);
        cursor: pointer;
        margin-bottom: 8px;
      }

      .metric-line {
        display: grid;
        grid-template-columns: 88px 1fr 38px;
        gap: 8px;
        align-items: center;
        font-size: 13px;
        margin-top: 6px;
      }

      .resource-library {
        margin-top: 18px;
        padding: 22px;
        border-radius: 30px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(247, 242, 232, 0.96)),
          radial-gradient(circle at top right, rgba(19, 138, 135, 0.08), transparent 34%);
        border: 1px solid rgba(22, 52, 68, 0.08);
        box-shadow: var(--shadow);
      }

      .resource-library-header {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) auto;
        gap: 18px;
        align-items: end;
        margin-bottom: 18px;
      }

      .resource-kicker {
        margin: 0 0 10px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--muted);
      }

      .resource-hub-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--navy);
        text-decoration: none;
        font-family: var(--serif);
        font-size: clamp(1.6rem, 3vw, 2.3rem);
        line-height: 1.05;
        letter-spacing: -0.03em;
      }

      .resource-hub-link:hover {
        color: #1e5361;
      }

      .resource-hub-link::after {
        content: "->";
        font-family: var(--sans);
        font-size: 0.9rem;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .resource-intro {
        margin: 12px 0 0;
        max-width: 74ch;
        color: var(--muted);
        line-height: 1.6;
      }

      .resource-summary {
        align-self: start;
        justify-self: end;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(22, 52, 68, 0.08);
        color: var(--navy);
        font-weight: 700;
        white-space: nowrap;
      }

      .resource-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .resource-card {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 18px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(22, 52, 68, 0.08);
        box-shadow: 0 14px 30px rgba(18, 38, 47, 0.08);
      }

      .resource-topline,
      .resource-pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .resource-source,
      .resource-format,
      .resource-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 28px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .resource-source {
        background: rgba(19, 138, 135, 0.12);
        color: #0e6361;
      }

      .resource-format {
        background: rgba(216, 155, 47, 0.14);
        color: #85580e;
      }

      .resource-card h3 {
        margin: 0;
        font-size: 1.15rem;
        line-height: 1.3;
      }

      .resource-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.58;
      }

      .resource-pill {
        background: rgba(22, 52, 68, 0.08);
        color: var(--navy);
      }

      .resource-pill.subtle {
        background: rgba(91, 111, 126, 0.12);
        color: #425462;
      }

      .resource-link {
        margin-top: auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 11px 14px;
        border-radius: 16px;
        background: linear-gradient(135deg, var(--navy), #1f5160);
        color: #fff;
        text-decoration: none;
        font-weight: 800;
        box-shadow: 0 12px 24px rgba(18, 52, 68, 0.16);
      }

      .resource-link:hover {
        transform: translateY(-1px);
      }

      .tooltip {
        position: fixed;
        z-index: 40;
        min-width: 220px;
        max-width: 320px;
        border-radius: 16px;
        background: rgba(17, 33, 40, 0.96);
        color: #f8fbfc;
        padding: 12px 13px;
        box-shadow: 0 20px 40px rgba(7, 15, 18, 0.35);
        pointer-events: none;
        opacity: 0;
        transform: translate(-50%, -110%);
        transition: opacity 120ms ease;
      }

      .tooltip.show {
        opacity: 1;
      }

      .tooltip strong {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
      }

      .tooltip-line {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 12px;
        margin-top: 4px;
      }

      .empty-state {
        min-height: 180px;
        border-radius: 18px;
        background: rgba(22, 52, 68, 0.05);
        display: grid;
        place-items: center;
        text-align: center;
        color: var(--muted);
        padding: 20px;
      }

      @media (max-width: 1220px) {
        .filters-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .hero {
          grid-template-columns: 1fr;
        }

        .panel {
          grid-column: span 6;
        }

        .panel.span-7,
        .panel.span-8 {
          grid-column: span 12;
        }

        .explorer-layout {
          grid-template-columns: 1fr;
        }

        .metric-comparison {
          grid-template-columns: 1fr;
        }

        .resource-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 860px) {
        .app-shell {
          width: min(100vw - 18px, 100%);
          margin: 10px auto 24px;
        }

        .control-top,
        .selection-row {
          flex-direction: column;
          align-items: stretch;
        }

        .filters-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .panel,
        .panel.span-5,
        .panel.span-6,
        .panel.span-7,
        .panel.span-8,
        .panel.span-12 {
          grid-column: 1 / -1;
        }

        .hero-metrics,
        .profile-grid {
          grid-template-columns: 1fr;
        }

        .resource-library-header,
        .resource-grid {
          grid-template-columns: 1fr;
        }

        .resource-summary {
          justify-self: start;
        }

        .bar-row {
          grid-template-columns: 1fr;
        }

        .heat-head,
        .heat-row {
          grid-template-columns: 130px repeat(5, minmax(0, 1fr));
        }
      }

</style>

    <script>
      const tooltip = document.getElementById("tooltip");
      let years = [];
      let latamCountries = [];
      let regionOrder = [];
      let sectorOrder = [];
      let countryProfiles = [];
      let countryLookup = {};
      let macroSeries = [];
      let firmSeries = [];
      let resourceHub = {};
      let resourceLinks = [];

      async function fetchJson(path) {
        const response = await fetch(path);
        if (!response.ok) {
          throw new Error(`Failed to load ${path}: ${response.status}`);
        }
        return response.json();
      }

      function assignDashboardData(config, facts, content) {
        years = config.years || [];
        latamCountries = config.latamCountries || [];
        regionOrder = config.regionOrder || [];
        sectorOrder = config.sectorOrder || [];
        countryProfiles = config.countryProfiles || [];
        countryLookup = Object.fromEntries(countryProfiles.map((row) => [row.country, row]));
        macroSeries = facts.macroSeries || [];
        firmSeries = facts.firmSeries || [];
        resourceHub = content.resourceHub || {};
        resourceLinks = content.resourceLinks || [];
      }

      function renderDataLoadError(error) {
        const message =
          'Unable to load dashboard data. Open the app through a local web server so the browser can fetch the JSON files.';
        const content = document.querySelector(".content");
        content.innerHTML = `
          <section class="panel-grid">
            <article class="panel span-12">
              <div class="empty-state">${message}</div>
            </article>
          </section>
        `;
        console.error(error);
      }

      async function bootstrap() {
        try {
          const embedded = window.__DASHBOARD_DATA__;
          const [config, facts, content] = embedded
            ? [embedded.config, embedded.facts, embedded.content]
            : await Promise.all([
                fetchJson("./data/config.json"),
                fetchJson("./data/facts.json"),
                fetchJson("./data/content.json")
              ]);
          assignDashboardData(config, facts, content);
          renderAll();
        } catch (error) {
          renderDataLoadError(error);
        }
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function round1(value) {
        return Math.round(value * 10) / 10;
      }

      function t(path) {
        return path.split(".").reduce((acc, key) => acc[key], i18n[state.lang]);
      }

      function labelRegion(value) {
        return regionNames[state.lang][value] || value;
      }

      function labelCountry(value) {
        return countryNames[state.lang][value] || value;
      }

      function labelSector(value) {
        return sectorNames[state.lang][value] || value;
      }

      function labelGeneration(value) {
        if (value === "Founder") return t("options.founder");
        if (value === "2nd") return t("options.second");
        if (value === "3rd+") return t("options.third");
        return t("options.na");
      }

      function labelOwnership(value) {
        return value === "Family" ? t("options.family") : t("options.nonFamily");
      }

      function labelSize(value) {
        if (value === "Micro") return t("options.micro");
        if (value === "SME") return t("options.sme");
        return t("options.large");
      }

      function labelAgeBand(value) {
        const map = {
          "0-10": t("options.age1"),
          "11-25": t("options.age2"),
          "26-50": t("options.age3"),
          "51+": t("options.age4")
        };
        return map[value] || value;
      }

      function labelRiskBand(value) {
        if (value === "Low") return t("options.low");
        if (value === "Medium") return t("options.medium");
        return t("options.high");
      }

      function labelMaturity(value) {
        if (value === "Low") return t("options.low");
        if (value === "Medium") return t("options.medium");
        return t("options.high");
      }

      function governanceFlagLabel(key) {
        const map = {
          board: { en: "Board", es: "Consejo" },
          independentBoard: { en: "Independent", es: "Independientes" },
          auditCommittee: { en: "Audit", es: "Auditoria" },
          familyCouncil: { en: "Family council", es: "Consejo familiar" },
          shareholderAgreement: { en: "Shareholder agreement", es: "Pacto de socios" },
          professionalCEO: { en: "Professional CEO", es: "CEO profesional" },
          successionPlan: { en: "Succession", es: "Sucesion" }
        };
        return map[key][state.lang];
      }

      function sizeBand(row) {
        if (row.employees < 50 || row.revenue < 10) return "Micro";
        if (row.employees < 250 || row.revenue < 100) return "SME";
        return "Large";
      }

      function ageBand(age) {
        if (age <= 10) return "0-10";
        if (age <= 25) return "11-25";
        if (age <= 50) return "26-50";
        return "51+";
      }

      function riskBand(row) {
        const composite =
          (row.informalityRisk + (100 - row.creditScore) + row.taxPressure + row.politicalRisk) / 4;
        if (composite >= 60) return "High";
        if (composite >= 42) return "Medium";
        return "Low";
      }

      function governanceScore(row) {
        return [
          row.board,
          row.independentBoard,
          row.auditCommittee,
          row.familyCouncil,
          row.shareholderAgreement,
          row.successionPlan,
          row.professionalCEO
        ].filter(Boolean).length;
      }

      function governanceMaturity(row) {
        const score = governanceScore(row);
        if (score >= 6) return "High";
        if (score >= 3) return "Medium";
        return "Low";
      }

      function successionRiskLevel(row) {
        if (row.ownershipType !== "Family") return "Low";
        if (!row.successionPlan && row.generation === "Founder" && row.leaderAge >= 60) return "High";
        if (!row.successionPlan && row.generation === "Founder" && row.leaderAge >= 55) return "Medium";
        if (!row.successionPlan && row.generation === "2nd" && row.leaderAge >= 60) return "Medium";
        return "Low";
      }

      function formatPct(value) {
        return `${round1(value)}%`;
      }

      function formatMoney(value) {
        return `$${Intl.NumberFormat("en-US", { maximumFractionDigits: 0 }).format(value)}m`;
      }

      function formatInt(value) {
        return Intl.NumberFormat("en-US", { maximumFractionDigits: 0 }).format(value);
      }

      function getActiveFirmRows(ignore = []) {
        const f = state.filters;
        return firmSeries
          .filter((row) => row.year === Number(f.year))
          .filter((row) => (ignore.includes("region") || f.region === "All" ? true : row.region === f.region))
          .filter((row) => (ignore.includes("country") || f.country === "All" ? true : row.country === f.country))
          .filter((row) => (ignore.includes("city") || f.city === "All" ? true : row.city === f.city))
          .filter((row) => (ignore.includes("sector") || f.sector === "All" ? true : row.sector === f.sector))
          .filter((row) =>
            ignore.includes("ownership") || f.ownership === "All" ? true : row.ownershipType === f.ownership
          )
          .filter((row) => {
            if (ignore.includes("ownershipBand") || f.ownershipBand === "All") return true;
            const value = row.familyShareholding;
            if (f.ownershipBand === "0-25") return value <= 25;
            if (f.ownershipBand === "26-50") return value >= 26 && value <= 50;
            if (f.ownershipBand === "51-75") return value >= 51 && value <= 75;
            return value >= 76;
          })
          .filter((row) =>
            ignore.includes("generation") || f.generation === "All" ? true : row.generation === f.generation
          )
          .filter((row) => (ignore.includes("size") || f.size === "All" ? true : sizeBand(row) === f.size))
          .filter((row) => (ignore.includes("ageBand") || f.ageBand === "All" ? true : ageBand(row.age) === f.ageBand))
          .filter((row) => {
            if (ignore.includes("board") || f.board === "All") return true;
            return f.board === "Yes" ? row.independentBoard : !row.independentBoard;
          })
          .filter((row) => {
            if (ignore.includes("succession") || f.succession === "All") return true;
            return f.succession === "Yes" ? row.successionPlan : !row.successionPlan;
          })
          .filter((row) => {
            if (ignore.includes("professionalCEO") || f.professionalCEO === "All") return true;
            return f.professionalCEO === "Yes" ? row.professionalCEO : !row.professionalCEO;
          })
          .filter((row) =>
            ignore.includes("maturity") || f.maturity === "All" ? true : governanceMaturity(row) === f.maturity
          )
          .filter((row) => (ignore.includes("risk") || f.risk === "All" ? true : riskBand(row) === f.risk));
      }

      function getMacroRows(ignore = []) {
        const year = Number(state.filters.year);
        const region = state.filters.region;
        const country = state.filters.country;
        return macroSeries
          .filter((row) => row.year === year)
          .filter((row) => (ignore.includes("region") || region === "All" ? true : row.region === region))
          .filter((row) => (ignore.includes("country") || country === "All" ? true : row.country === country));
      }

      function weightedAverage(rows, key, weight = "companyUniverse") {
        const numerator = rows.reduce((sum, row) => sum + row[key] * row[weight], 0);
        const denominator = rows.reduce((sum, row) => sum + row[weight], 0);
        return denominator ? numerator / denominator : 0;
      }

      function sectorDominance(country) {
        const rows = getActiveFirmRows(["sector", "ownership"]).filter((row) => row.country === country);
        return sectorOrder
          .map((sector) => {
            const sectorRows = rows.filter((row) => row.sector === sector);
            const familyRevenue = sectorRows
              .filter((row) => row.ownershipType === "Family")
              .reduce((sum, row) => sum + row.revenue, 0);
            const totalRevenue = sectorRows.reduce((sum, row) => sum + row.revenue, 0);
            return {
              sector,
              share: totalRevenue ? (familyRevenue / totalRevenue) * 100 : 0
            };
          })
          .filter((row) => row.share > 0)
          .sort((a, b) => b.share - a.share)
          .slice(0, 3);
      }

      function generationMixForCountry(country) {
        const rows = getActiveFirmRows(["generation", "ownership"]).filter(
          (row) => row.country === country && row.ownershipType === "Family"
        );
        const counts = {
          Founder: rows.filter((row) => row.generation === "Founder").length,
          "2nd": rows.filter((row) => row.generation === "2nd").length,
          "3rd+": rows.filter((row) => row.generation === "3rd+").length
        };
        const total = counts.Founder + counts["2nd"] + counts["3rd+"];
        return { counts, total };
      }

      function renderPresetStrip() {
        const values = [
          { key: "Global", country: "All", region: "All" },
          { key: "LATAM", country: "All", region: "LATAM" },
          { key: "Mexico", country: "Mexico", region: "LATAM" },

          { key: "Peru", country: "Peru", region: "LATAM" }
        ];
        const labels = t("presets");
        document.getElementById("presetStrip").innerHTML = values
          .map((preset, index) => {

              state.filters.country === preset.country &&

      function renderBubbleMap(targetId, rows, bounds) {
        const container = document.getElementById(targetId);
        if (!rows.length) {
          container.innerHTML = `<div class="empty-state">${t("generic.noRows")}</div>`;
          return;
        }
        const width = targetId === "latamMap" ? 760 : 920;
        const height = targetId === "latamMap" ? 360 : 340;
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

        const bg = svgNode("rect", {
          x: 0,
          y: 0,
          width,
          height,
          rx: 22,
          fill: targetId === "latamMap" ? "rgba(19,138,135,0.06)" : "rgba(22,52,68,0.05)"
        });
        svg.appendChild(bg);

        const { minLon, maxLon, minLat, maxLat } = bounds;
        for (let lon = Math.ceil(minLon / 20) * 20; lon <= maxLon; lon += 20) {
          const x = ((lon - minLon) / (maxLon - minLon)) * width;
          svg.appendChild(
            svgNode("line", {
              x1: x,
              y1: 0,
              x2: x,
              y2: height,
              stroke: "rgba(22,52,68,0.08)",
              "stroke-width": 1
            })
          );
        }
        for (let lat = Math.ceil(minLat / 15) * 15; lat <= maxLat; lat += 15) {
          const y = ((maxLat - lat) / (maxLat - minLat)) * height;
          svg.appendChild(
            svgNode("line", {
              x1: 0,
              y1: y,
              x2: width,
              y2: y,
              stroke: "rgba(22,52,68,0.08)",
              "stroke-width": 1
            })
          );
        }

        const metricKey = state.globalMetric;

        rows.forEach((row) => {
          const x = ((row.lon - minLon) / (maxLon - minLon)) * width;
          const y = ((maxLat - row.lat) / (maxLat - minLat)) * height;
          const radius = 8 + (row[metricKey] / 100) * (targetId === "latamMap" ? 24 : 22);
          const circle = svgNode("circle", {
            cx: x,
            cy: y,
            r: radius,
            fill: colorForMetric(row[metricKey]),
            opacity: 0.86,
            stroke: latamCountries.includes(row.country) ? "rgba(216,155,47,0.95)" : "rgba(255,255,255,0.9)",
            "stroke-width": latamCountries.includes(row.country) ? 3 : 2
          });

          const label = svgNode("text", {
            x,
            y: y + 4,
            "text-anchor": "middle",
            "font-size": targetId === "latamMap" ? 10 : 9,
            "font-family": "Aptos, Segoe UI, Arial, sans-serif",
            fill: "#17303b",
            "font-weight": "700"
          });
          label.textContent = row.code;
          label.setAttribute("pointer-events", "none");

          circle.style.cursor = "pointer";
          circle.addEventListener("click", () => {
            state.filters.region = row.region;
            state.filters.country = row.country;
            state.filters.city = "All";
            renderAll();
          });
          circle.addEventListener("mouseenter", (event) =>
            showTooltip(event, buildCountryTooltip(row))
          );
          circle.addEventListener("mousemove", moveTooltip);
          circle.addEventListener("mouseleave", hideTooltip);

          svg.appendChild(circle);
          svg.appendChild(label);
        });

        container.innerHTML = "";
        container.appendChild(svg);
      }

      function polarToCartesian(cx, cy, radius, angle) {
        const radians = ((angle - 90) * Math.PI) / 180;
        return {
          x: cx + radius * Math.cos(radians),
          y: cy + radius * Math.sin(radians)
        };
      }

      function donutPath(cx, cy, outerRadius, innerRadius, startAngle, endAngle) {
        const outerStart = polarToCartesian(cx, cy, outerRadius, endAngle);
        const outerEnd = polarToCartesian(cx, cy, outerRadius, startAngle);
        const innerStart = polarToCartesian(cx, cy, innerRadius, startAngle);
        const innerEnd = polarToCartesian(cx, cy, innerRadius, endAngle);
        const largeArc = endAngle - startAngle <= 180 ? 0 : 1;
        return [
          `M ${outerStart.x} ${outerStart.y}`,
          `A ${outerRadius} ${outerRadius} 0 ${largeArc} 0 ${outerEnd.x} ${outerEnd.y}`,
          `L ${innerStart.x} ${innerStart.y}`,
          `A ${innerRadius} ${innerRadius} 0 ${largeArc} 1 ${innerEnd.x} ${innerEnd.y}`,
          "Z"
        ].join(" ");
      }

      function renderDonut(containerId, segments, centerTitle, clickHandler) {
        const container = document.getElementById(containerId);
        const total = segments.reduce((sum, segment) => sum + segment.value, 0);
        if (!total) {
          container.innerHTML = `<div class="empty-state">${t("generic.noRows")}</div>`;
          return;
        }
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "0 0 300 270");
        let angle = 0;
        segments.forEach((segment) => {
          const delta = (segment.value / total) * 360;
          const path = svgNode("path", {
            d: donutPath(150, 115, 92, 56, angle, angle + delta),
            fill: segment.color,
            opacity: 0.92
          });
          path.style.cursor = "pointer";
          path.addEventListener("click", () => clickHandler(segment.key));
          path.addEventListener("mouseenter", (event) =>
            showTooltip(
              event,
              `<strong>${segment.label}</strong><div class="tooltip-line"><span>${t(
                "generic.clickable"
              )}</span><span>${segment.value}</span></div><div class="tooltip-line"><span>${t(
                "generic.familyShare"
              )}</span><span>${formatPct((segment.value / total) * 100)}</span></div>`
            )
          );
          path.addEventListener("mousemove", moveTooltip);
          path.addEventListener("mouseleave", hideTooltip);
          svg.appendChild(path);
          angle += delta;
        });
        const title = svgNode("text", {
          x: 150,
          y: 108,
          "text-anchor": "middle",
          "font-size": 14,
          "font-family": "Aptos, Segoe UI, Arial, sans-serif",
          fill: "#5f7480"
        });
        title.textContent = centerTitle;
        const totalText = svgNode("text", {
          x: 150,
          y: 132,
          "text-anchor": "middle",
          "font-size": 26,
          "font-family": "Aptos, Segoe UI, Arial, sans-serif",
          "font-weight": "800",
          fill: "#17303b"
        });
        totalText.textContent = String(total);
        svg.appendChild(title);
        svg.appendChild(totalText);
        container.innerHTML = "";
        container.appendChild(svg);
        const legend = document.createElement("div");
        legend.className = "legend";
        legend.innerHTML = segments
          .map(
            (segment) =>
              `<button class="chip-btn" style="background:${segment.color}; color:#fff;" data-donut-filter="${containerId}:${segment.key}">${segment.label}</button>`
          )
          .join("");
        container.appendChild(legend);
      }

      function renderBenchmarkChart() {
        const rows = getActiveFirmRows(["region", "country", "city", "ownership"]);
        const groups = [
          {
            key: "global-family",
            label: `${t("tabs.global")} / ${t("options.family")}`,
            rows: rows.filter((row) => row.ownershipType === "Family"),
            color: "rgba(19,138,135,0.95)"
          },
          {
            key: "global-non-family",
            label: `${t("tabs.global")} / ${t("options.nonFamily")}`,
            rows: rows.filter((row) => row.ownershipType === "Non-family"),
            color: "rgba(91,111,126,0.95)"
          },
          {
            key: "latam-family",
            label: `LATAM / ${t("options.family")}`,
            rows: rows.filter((row) => row.region === "LATAM" && row.ownershipType === "Family"),
            color: "rgba(216,155,47,0.95)"
          },
          {
            key: "latam-non-family",
            label: `LATAM / ${t("options.nonFamily")}`,
            rows: rows.filter((row) => row.region === "LATAM" && row.ownershipType === "Non-family"),
            color: "rgba(205,93,72,0.95)"
          }
        ];

        const overallAvg = average(rows.map((row) => row.ebitdaMargin));
        const familyAvg = average(rows.filter((row) => row.ownershipType === "Family").map((row) => row.ebitdaMargin));
        const maxValue = Math.max(22, ...groups.map((group) => average(group.rows.map((row) => row.ebitdaMargin))));
        const width = 920;
        const height = 280;
        const left = 54;
        const bottom = 44;
        const innerHeight = height - bottom - 24;
        const slot = 180;
        const barWidth = 62;
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
        svg.appendChild(svgNode("rect", { x: 0, y: 0, width, height, rx: 22, fill: "rgba(22,52,68,0.04)" }));

        for (let step = 0; step <= 5; step += 1) {
          const y = 24 + (innerHeight / 5) * step;
          svg.appendChild(
            svgNode("line", {
              x1: left,
              y1: y,
              x2: width - 24,
              y2: y,
              stroke: "rgba(22,52,68,0.08)",
              "stroke-width": 1
            })
          );
          const label = svgNode("text", {
            x: 18,
            y: y + 4,
            "font-size": 11,
            fill: "#5f7480",
            "font-family": "Aptos, Segoe UI, Arial, sans-serif"
          });
          label.textContent = `${Math.round(maxValue - (maxValue / 5) * step)}%`;
          svg.appendChild(label);
        }

        const lines = [
          { value: overallAvg, color: "rgba(91,111,126,0.95)", label: t("generic.allFirmsLine") },
          { value: familyAvg, color: "rgba(19,138,135,0.95)", label: t("generic.familyLine") }
        ];

        lines.forEach((line, index) => {
          const y = 24 + innerHeight - (line.value / maxValue) * innerHeight;
          svg.appendChild(
            svgNode("line", {
              x1: left,
              y1: y,
              x2: width - 24,
              y2: y,
              stroke: line.color,
              "stroke-width": 2,
              "stroke-dasharray": index === 0 ? "6 5" : "3 4"
            })
          );
        });

        groups.forEach((group, index) => {
          const value = average(group.rows.map((row) => row.ebitdaMargin));
          const heightValue = (value / maxValue) * innerHeight;
          const x = left + 46 + index * slot;
          const y = 24 + innerHeight - heightValue;
          const rect = svgNode("rect", {
            x,
            y,
            width: barWidth,
            height: heightValue,
            rx: 16,
            fill: group.color
          });
          rect.style.cursor = "pointer";
          rect.addEventListener("click", () => {
            if (group.key.includes("latam")) {
              state.filters.region = "LATAM";
              state.filters.country = "All";
              state.filters.city = "All";
            } else {
              state.filters.region = "All";
              state.filters.country = "All";
              state.filters.city = "All";
            }
            state.filters.ownership = group.key.includes("non-family") ? "Non-family" : "Family";
            renderAll();
          });
          rect.addEventListener("mouseenter", (event) =>
            showTooltip(
              event,
              `<strong>${group.label}</strong><div class="tooltip-line"><span>${t("comparison.margin")}</span><span>${formatPct(
                value
              )}</span></div><div class="tooltip-line"><span>${t("generic.filteredRows")}</span><span>${group.rows.length}</span></div>`
            )
          );
          rect.addEventListener("mousemove", moveTooltip);
          rect.addEventListener("mouseleave", hideTooltip);
          svg.appendChild(rect);

          const valueLabel = svgNode("text", {
            x: x + barWidth / 2,
            y: y - 8,
            "text-anchor": "middle",
            "font-size": 12,
            fill: "#17303b",
            "font-weight": "700"
          });
          valueLabel.textContent = formatPct(value);
          valueLabel.setAttribute("pointer-events", "none");
          svg.appendChild(valueLabel);

          const text = svgNode("text", {
            x: x + barWidth / 2,
            y: height - 14,
            "text-anchor": "middle",
            "font-size": 11,
            fill: "#5f7480"
          });
          text.textContent = group.label;
          text.setAttribute("pointer-events", "none");
          svg.appendChild(text);
        });

        const legend = document.createElement("div");
        legend.className = "legend";
        legend.innerHTML = lines
          .map(
            (line) =>
              `<div class="legend-item"><span class="legend-swatch" style="background:${line.color}"></span>${line.label}</div>`
          )
          .join("");
        const container = document.getElementById("benchmarkChart");
        container.innerHTML = "";
        container.appendChild(svg);
        container.appendChild(legend);
      }

      function renderRiskGrid() {
        const rows = latamCountries.map((country) => {
          const firmRows = getActiveFirmRows(["country", "risk"]).filter((row) => row.country === country);
          const base = getMacroRows(["region", "country"]).find((row) => row.country === country);
          const risk = {
            informality: firmRows.length ? average(firmRows.map((row) => row.informalityRisk)) : base.informalityRisk,
            financeFriction: firmRows.length ? average(firmRows.map((row) => 100 - row.creditScore)) : 100 - base.creditScore,
            tax: firmRows.length ? average(firmRows.map((row) => row.taxPressure)) : base.taxPressure,
            political: firmRows.length ? average(firmRows.map((row) => row.politicalRisk)) : base.politicalRisk
          };
          return { country, risk };
        });

        document.getElementById("riskGrid").innerHTML = rows
          .map(
            (row) => `
              <button class="risk-card" data-risk-country="${row.country}">
                <div class="risk-title">
                  <strong>${labelCountry(row.country)}</strong>
                  <span class="muted">${labelRiskBand(
                    (() => {
                      const composite = average(Object.values(row.risk));
                      if (composite >= 60) return "High";
                      if (composite >= 42) return "Medium";
                      return "Low";
                    })()
                  )}</span>
                </div>
                <div class="risk-bars">
                  ${renderRiskLineHtml(t("generic.informality"), row.risk.informality, "rgba(205,93,72,0.95)")}

      function renderSuccessionRiskChart() {
        const rows = getActiveFirmRows(["country", "succession", "generation", "ownership"]).filter(
          (row) => row.region === "LATAM" && successionRiskLevel(row) === "High"
        );
        const countries = latamCountries.map((country) => {
          const countryRows = rows.filter((row) => row.country === country);
          return {
            country,
            count: countryRows.length,
            employees: countryRows.reduce((sum, row) => sum + row.employees, 0)
          };
        });
        const maxEmployees = Math.max(100, ...countries.map((row) => row.employees));
        const width = 920;
        const height = 300;
        const left = 124;
        const top = 30;
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
        svg.appendChild(svgNode("rect", { x: 0, y: 0, width, height, rx: 22, fill: "rgba(22,52,68,0.04)" }));

        for (let step = 0; step <= 4; step += 1) {
          const x = left + ((width - left - 40) / 4) * step;
          svg.appendChild(
            svgNode("line", {
              x1: x,
              y1: top,
              x2: x,
              y2: height - 36,
              stroke: "rgba(22,52,68,0.08)",
              "stroke-width": 1
            })
          );
          const text = svgNode("text", {
            x,
            y: height - 14,
            "text-anchor": "middle",
            "font-size": 11,
            fill: "#5f7480"
          });
          text.textContent = formatInt((maxEmployees / 4) * step);
          svg.appendChild(text);
        }

        countries.forEach((row, index) => {
          const y = top + index * 38 + 16;
          const label = svgNode("text", {
            x: 20,
            y: y + 4,
            "font-size": 12,
            fill: "#17303b",
            "font-weight": "700"
          });
          label.textContent = labelCountry(row.country);
          svg.appendChild(label);
          if (!row.count) return;
          const x = left + ((width - left - 40) * row.employees) / maxEmployees;
          const circle = svgNode("circle", {
            cx: x,
            cy: y,
            r: 10 + row.count * 6,
            fill: "rgba(205,93,72,0.86)",
            stroke: "rgba(255,255,255,0.95)",
            "stroke-width": 2
          });
          circle.style.cursor = "pointer";
          circle.addEventListener("click", () => {
            state.filters.region = "LATAM";
            state.filters.country = row.country;
            state.filters.city = "All";
            state.filters.ownership = "Family";
            state.filters.generation = "Founder";
            state.filters.succession = "No";
            renderAll();
          });
          circle.addEventListener("mouseenter", (event) =>
            showTooltip(
              event,
              `<strong>${labelCountry(row.country)}</strong><div class="tooltip-line"><span>${t(
                "generic.firmsAtRisk"
              )}</span><span>${row.count}</span></div><div class="tooltip-line"><span>${t(
                "generic.employeesAtRisk"
              )}</span><span>${formatInt(row.employees)}</span></div>`
            )
          );
          circle.addEventListener("mousemove", moveTooltip);
          circle.addEventListener("mouseleave", hideTooltip);
          svg.appendChild(circle);
        });

        const container = document.getElementById("successionRiskChart");
        container.innerHTML = "";
        container.appendChild(svg);
      }

      function showTooltip(event, html) {
        tooltip.innerHTML = html;
        tooltip.classList.add("show");
        moveTooltip(event);
      }

      function moveTooltip(event) {
        tooltip.style.left = `${event.clientX}px`;
        tooltip.style.top = `${event.clientY - 10}px`;
      }

      function hideTooltip() {
        tooltip.classList.remove("show");
      }

      function wireEvents() {
        document.querySelectorAll("[data-tab]").forEach((button) => {
          button.onclick = () => {
            state.activeTab = button.dataset.tab;
            renderAll();
          };
        });
        document.querySelectorAll("[data-lang]").forEach((button) => {
          button.onclick = () => {
            state.lang = button.dataset.lang;
            renderAll();
          };
        });
        document.querySelectorAll("[data-preset]").forEach((button) => {
          button.onclick = () => {
            const key = button.dataset.preset;
            resetFilters(true);
            if (key === "LATAM") state.filters.region = "LATAM";
            if (latamCountries.includes(key)) {
              state.filters.region = "LATAM";
              state.filters.country = key;
            }
            renderAll();
          };
        });
        document.querySelectorAll("[data-global-metric]").forEach((button) => {
          button.onclick = () => {
            state.globalMetric = button.dataset.globalMetric;
            renderAll();
          };
        });
        document.querySelectorAll("[data-heat-metric]").forEach((button) => {
          button.onclick = () => {
            state.heatmapMetric = button.dataset.heatMetric;
            renderAll();
          };
        });
        document.querySelectorAll("#yearSelect, #regionSelect, #countrySelect, #citySelect, #sectorSelect, #ownershipSelect, #ownershipBandSelect, #generationSelect, #sizeSelect, #ageBandSelect, #boardSelect, #successionSelect, #professionalCEOSelect, #maturitySelect, #riskSelect").forEach(
          (select) => {
            select.onchange = () => {
              const keyMap = {
                yearSelect: "year",
                regionSelect: "region",
                countrySelect: "country",
                citySelect: "city",
                sectorSelect: "sector",
                ownershipSelect: "ownership",
                ownershipBandSelect: "ownershipBand",
                generationSelect: "generation",
                sizeSelect: "size",
                ageBandSelect: "ageBand",
                boardSelect: "board",
                successionSelect: "succession",
                professionalCEOSelect: "professionalCEO",
                maturitySelect: "maturity",
                riskSelect: "risk"
              };
              state.filters[keyMap[select.id]] = select.value;
              if (select.id === "countrySelect") {
                if (select.value === "All") {
                  state.filters.city = "All";
                } else {
                  state.filters.region = countryLookup[select.value].region;
                }
              }
              if (
                select.id === "regionSelect" &&
                select.value !== "All" &&
                state.filters.country !== "All" &&
                countryLookup[state.filters.country].region !== select.value
              ) {
                state.filters.country = "All";
                state.filters.city = "All";
              }
              if (select.id === "regionSelect" && select.value === "All" && state.filters.country !== "All") {
                state.filters.country = "All";
                state.filters.city = "All";
              }
              renderAll();
            };
          }
        );
        document.querySelectorAll("[data-region-bar]").forEach((button) => {
          button.onclick = () => {
            state.filters.region = button.dataset.regionBar;
            state.filters.country = "All";
            state.filters.city = "All";
            renderAll();
          };
        });
        document.querySelectorAll("[data-heat-region]").forEach((button) => {
          button.onmouseenter = (event) =>
            showTooltip(
              event,
              `<strong>${labelSector(button.dataset.heatSector)} x ${labelRegion(
                button.dataset.heatRegion
              )}</strong><div class="tooltip-line"><span>${metricTooltipLabel()}</span><span>${Math.round(
                Number(button.dataset.value)
              )}%</span></div>`
            );
          button.onmousemove = moveTooltip;
          button.onmouseleave = hideTooltip;
          button.onclick = () => {
            state.filters.region = button.dataset.heatRegion;
            state.filters.country = "All";
            state.filters.city = "All";
            state.filters.sector = button.dataset.heatSector;
            state.activeTab = "latam";
            renderAll();
          };
        });
        document.querySelectorAll("[data-country-card]").forEach((button) => {
          button.onclick = () => {
            state.filters.region = "LATAM";
            state.filters.country = button.dataset.countryCard;
            state.filters.city = "All";
            renderAll();
          };
        });
        document.querySelectorAll("[data-generation-country]").forEach((button) => {
          button.onmouseenter = (event) =>
            showTooltip(
              event,
              `<strong>${labelCountry(button.dataset.generationCountry)}</strong><div class="tooltip-line"><span>${t(
                "labels.generation"
              )}</span><span>${labelGeneration(button.dataset.generation)}</span></div>`

          button.onmouseleave = hideTooltip;
          button.onclick = () => {
            state.filters.region = "LATAM";
            state.filters.country = button.dataset.generationCountry;
            state.filters.city = "All";
            state.filters.generation = button.dataset.generation;
            renderAll();
          };
        });
        document.querySelectorAll("[data-risk-country]").forEach((button) => {

            state.filters.country = button.dataset.riskCountry;
            state.filters.city = "All";

            const value = button.dataset.compareValue === "yes" ? "Yes" : "No";

            if (key === "successionPlan") state.filters.succession = value;
            if (key === "professionalCEO") state.filters.professionalCEO = value;
            state.filters.ownership = "Family";
            renderAll();
          };

        document.querySelectorAll("[data-donut-filter]").forEach((button) => {
          button.onclick = () => {
            const [containerId, key] = button.dataset.donutFilter.split(":");
            if (containerId === "ownershipDonut") state.filters.ownership = key;
            if (containerId === "govDonut") state.filters.maturity = key;
            renderAll();
          };
        });

        document.getElementById("clearFiltersBtn").onclick = () => {
          resetFilters(true);
          renderAll();
        };
      }

      function metricTooltipLabel() {
        if (state.heatmapMetric === "revenue") return t("generic.familyRevenueShare");
        if (state.heatmapMetric === "employment") return t("generic.familyEmploymentShare");
        return t("generic.familyCountShare");
      }

      function resetFilters(resetRegion = true) {
        state.filters = {
          year: state.filters.year,
          region: resetRegion ? "All" : state.filters.region,
          country: "All",
          city: "All",
          sector: "All",
          ownership: "All",
          ownershipBand: "All",
          generation: "All",
          size: "All",
          ageBand: "All",
          board: "All",
          succession: "All",
          professionalCEO: "All",
          maturity: "All",
          risk: "All"
        };
        state.selectedFirmId = null;
      }

      bootstrap();

    </script>
  </body>
</html>
